name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone KernelPatch SDK
        run: |
          git clone https://github.com/KernelSU-Next/KPatch-Next kpatch

      - name: Build KPMs
        run: |
          KP_DIR=kpatch
          CC=aarch64-linux-gnu-gcc

          INCLUDE_DIRS=". include patch/include linux/include linux/arch/arm64/include linux/tools/arch/arm64/include"
          INCLUDE_FLAGS=""
          for dir in $INCLUDE_DIRS; do
            INCLUDE_FLAGS="$INCLUDE_FLAGS -I$KP_DIR/kernel/$dir"
          done

          CFLAGS="$INCLUDE_FLAGS -Thide.lds -fno-stack-protector -fno-asynchronous-unwind-tables -fno-unwind-tables -c -O2"

          echo "=== Building hide.kpm ==="
          $CC $CFLAGS -o hide.o hide.c
          $CC -r -o hide.kpm hide.o
          ls -la hide.kpm
          file hide.kpm

          echo "=== Building selinux_context_hide.kpm ==="
          $CC $CFLAGS -o selinux_context_hide.o selinux_context_hide.c
          $CC -r -o selinux_context_hide.kpm selinux_context_hide.o
          ls -la selinux_context_hide.kpm
          file selinux_context_hide.kpm

          echo "=== Building selinux_execmem_hide.kpm ==="
          $CC $CFLAGS -o selinux_execmem_hide.o selinux_execmem_hide.c
          $CC -r -o selinux_execmem_hide.kpm selinux_execmem_hide.o
          ls -la selinux_execmem_hide.kpm
          file selinux_execmem_hide.kpm

      - name: Upload hide.kpm
        uses: actions/upload-artifact@v4
        with:
          name: hide
          path: hide.kpm

      - name: Upload selinux_context_hide.kpm
        uses: actions/upload-artifact@v4
        with:
          name: selinux_context_hide
          path: selinux_context_hide.kpm

      - name: Upload selinux_execmem_hide.kpm
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: selinux_execmem_hide.kpm
