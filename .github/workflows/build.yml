name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "TOOLCHAIN_PATH=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_ENV
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_PATH

      - name: Clone KernelPatch SDK
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next kpatch

      - name: Build KPM
        run: |
          KP_DIR=kpatch
          CC=aarch64-none-linux-gnu-gcc
          SRC=uname_spoof.c
          
          # Configuración de Includes basada en el SDK de KPatch
          INCLUDE_FLAGS="-I. -I$KP_DIR/kernel/include -I$KP_DIR/kernel/patch/include -I$KP_DIR/kernel/linux/include -I$KP_DIR/kernel/linux/arch/arm64/include"
          
          # Flags para entorno kernel (evita dependencias de librerías de usuario)
          CFLAGS="-O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user="
          
          echo "Compilando objeto..."
          $CC $INCLUDE_FLAGS $CFLAGS -c -o uname_spoof.o $SRC
          
          echo "Enlazando KPM..."
          # Usamos -r para generar un objeto reubicable (formato KPM)
          $CC -r -o uname_spoof.kpm uname_spoof.o

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
