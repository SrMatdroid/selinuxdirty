name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2.Rel1
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> "$GITHUB_PATH"

      - name: Clone KPatch-Next
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          echo "=== Estructura de KPatch ==="
          find kpatch-next -type f -name "*.h" | head -20

      - name: Create KPM environment
        run: |
          KP_INC="$(dirname "$(find kpatch-next -iname 'kpmodule.h' | head -n1)")"
          echo "KP_INC=$KP_INC"
          
          # Crear directorio de trabajo para headers
          mkdir -p kpm_build/include/linux
          mkdir -p kpm_build/include/asm
          
          # Copiar headers de KPatch
          cp -r "$KP_INC"/* kpm_build/include/ 2>/dev/null || true
          
          # Crear headers mínimos del kernel
          cat > kpm_build/include/linux/types.h << 'EOF'
          #ifndef _LINUX_TYPES_H
          #define _LINUX_TYPES_H
          
          typedef unsigned char u8;
          typedef unsigned short u16;
          typedef unsigned int u32;
          typedef unsigned long long u64;
          typedef signed char s8;
          typedef signed short s16;
          typedef signed int s32;
          typedef signed long long s64;
          
          typedef u32 uid_t;
          typedef unsigned int gfp_t;
          
          #endif
          EOF
          
          cat > kpm_build/include/linux/string.h << 'EOF'
          #ifndef _LINUX_STRING_H
          #define _LINUX_STRING_H
          
          #include <linux/types.h>
          
          static inline int strlen(const char *s)
          {
              int n = 0;
              while (*s++) n++;
              return n;
          }
          
          static inline int strcmp(const char *s1, const char *s2)
          {
              while (*s1 && *s2 && *s1 == *s2) {
                  s1++; s2++;
              }
              return *s1 - *s2;
          }
          
          #endif
          EOF
          
          cat > kpm_build/include/linux/kernel.h << 'EOF'
          #ifndef _LINUX_KERNEL_H
          #define _LINUX_KERNEL_H
          
          #include <linux/types.h>
          
          #define KERN_INFO ""
          #define KERN_ERR ""
          #define GFP_KERNEL 0xcc0
          
          #define pr_info(fmt, ...) 
          #define pr_err(fmt, ...) 
          #define printk(fmt, ...) 
          
          #endif
          EOF
          
          cat > kpm_build/include/linux/kallsyms.h << 'EOF'
          #ifndef _LINUX_KALLSYMS_H
          #define _LINUX_KALLSYMS_H
          
          static inline void *kallsyms_lookup_name(const char *name)
          {
              return 0;
          }
          
          #endif
          EOF
          
          cat > kpm_build/include/linux/sched.h << 'EOF'
          #ifndef _LINUX_SCHED_H
          #define _LINUX_SCHED_H
          
          struct task_struct {
              struct cred *cred;
          };
          
          extern struct task_struct *current;
          
          #endif
          EOF
          
          cat > kpm_build/include/linux/cred.h << 'EOF'
          #ifndef _LINUX_CRED_H
          #define _LINUX_CRED_H
          
          #include <linux/types.h>
          
          struct cred {
              uid_t uid;
          };
          
          #endif
          EOF
          
          cat > kpm_build/include/asm/current.h << 'EOF'
          #ifndef _ASM_CURRENT_H
          #define _ASM_CURRENT_H
          
          #include <linux/sched.h>
          
          static inline struct task_struct *get_current(void)
          {
              struct task_struct *cur;
              asm volatile("mrs %0, sp_el0" : "=r"(cur));
              return cur;
          }
          
          #define current get_current()
          
          #endif
          EOF

      - name: Create kputils.h compatible
        run: |
          cat > kpm_build/include/kputils.h << 'EOF'
          #ifndef __KPUTILS_H__
          #define __KPUTILS_H__
          
          #include <linux/types.h>
          #include <linux/cred.h>
          #include <asm/current.h>
          
          static inline uid_t current_uid(void)
          {
              return current->cred->uid;
          }
          
          #endif
          EOF

      - name: Download kptools
        run: |
          curl -sL $(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest \
            | grep browser_download_url | grep 'kptools-linux' | cut -d '"' -f4 | head -n1) -o kptools
          chmod +x kptools
          ./kptools --help || true

      - name: Compile KPM object
        run: |
          aarch64-none-linux-gnu-gcc \
            -c selinux_execmem_hide.c \
            -o selinux_execmem_hide.o \
            -I kpm_build/include \
            -nostdinc \
            -D__KERNEL__ \
            -DMODULE \
            -fno-stack-protector \
            -fno-pic \
            -Wall \
            -O2 \
            -ffreestanding \
            -static

      - name: Package as .kpm
        run: |
          if [ -f kptools ]; then
            ./kptools pack -o selinux_execmem_hide.kpm selinux_execmem_hide.o 2>/dev/null || \
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
          else
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
          fi
          
          ls -la selinux_execmem_hide.*

      - name: Upload KPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: selinux_execmem_hide.kpm
