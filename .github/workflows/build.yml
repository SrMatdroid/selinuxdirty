name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Download kptools
        run: |
          curl -sL $(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest \
            | grep browser_download_url | grep 'kptools-linux' | cut -d '"' -f4 | head -n1) -o kptools
          chmod +x kptools

      - name: Clone KPatch-Next headers
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          KPM_INC=$(dirname "$(find kpatch-next -name 'kpmodule.h' | head -n1)")
          echo "KPM_INC=$KPM_INC" >> $GITHUB_ENV

      - name: Build KPM
        run: |
          # Compilar con kpcc de kptools si existe, o directamente con gcc
          if ./kptools cc --help 2>/dev/null; then
            ./kptools cc -i $KPM_INC -o selinux_execmem_hide.kpm selinux_execmem_hide.c
          else
            # Método directo con gcc para kernel module
            aarch64-linux-gnu-gcc \
              -I$KPM_INC \
              -D__KERNEL__ \
              -DMODULE \
              -fno-pic \
              -fno-stack-protector \
              -O2 \
              -c selinux_execmem_hide.c \
              -o selinux_execmem_hide.o
            
            # Empaquetar como .kpm
            if ./kptools pack --help 2>/dev/null; then
              ./kptools pack -o selinux_execmem_hide.kpm selinux_execmem_hide.o
            else
              cp selinux_execmem_hide.o selinux_execmem_hide.kpm
            fi
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide.kpm
          path: selinux_execmem_hide.kpm
