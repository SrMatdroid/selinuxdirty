name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2.Rel1
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> "$GITHUB_PATH"

      - name: Clone KPatch-Next
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          echo "=== Headers encontrados ==="
          find kpatch-next -name "*.h" -type f

      - name: Create missing headers
        run: |
          # Crear kputils.h si no existe
          KP_INC=$(dirname "$(find kpatch-next -iname 'kpmodule.h' | head -n1)")
          
          if [ ! -f "$KP_INC/kputils.h" ]; then
            cat > "$KP_INC/kputils.h" << 'HEADER_EOF'
          #ifndef __KPUTILS_H__
          #define __KPUTILS_H__
          
          #include <linux/types.h>
          
          // Basic utility functions for KPM
          static inline uid_t current_uid(void)
          {
              return current->cred->uid.val;
          }
          
          #endif /* __KPUTILS_H__ */
          HEADER_EOF
            echo "Created kputils.h"
          fi
          
          # Crear compiler.h si no existe
          if [ ! -f "$KP_INC/compiler.h" ]; then
            cat > "$KP_INC/compiler.h" << 'HEADER_EOF'
          #ifndef __COMPILER_H__
          #define __COMPILER_H__
          
          // Compiler macros
          #define __user
          #define likely(x)   __builtin_expect(!!(x), 1)
          #define unlikely(x) __builtin_expect(!!(x), 0)
          
          #endif /* __COMPILER_H__ */
          HEADER_EOF
            echo "Created compiler.h"
          fi
          
          # Crear hook.h si no existe
          if [ ! -f "$KP_INC/hook.h" ]; then
            cat > "$KP_INC/hook.h" << 'HEADER_EOF'
          #ifndef __HOOK_H__
          #define __HOOK_H__
          
          #include <linux/types.h>
          
          typedef enum {
              HOOK_NO_ERR = 0,
          } hook_err_t;
          
          typedef struct {
              unsigned long arg0, arg1, arg2, arg3, arg4;
          } hook_fargs5_t;
          
          extern hook_err_t hook_wrap5(void *target, void *before, void *after, void *udata);
          extern void hook_unwrap(void *target, void *before, void *after);
          
          #endif /* __HOOK_H__ */
          HEADER_EOF
            echo "Created hook.h"
          fi
          
          # Crear asm/current.h si no existe
          mkdir -p "$KP_INC/asm"
          if [ ! -f "$KP_INC/asm/current.h" ]; then
            cat > "$KP_INC/asm/current.h" << 'HEADER_EOF'
          #ifndef __ASM_CURRENT_H__
          #define __ASM_CURRENT_H__
          
          #include <linux/compiler.h>
          
          struct task_struct;
          
          // For ARM64, current is usually in sp_el0
          static __always_inline struct task_struct *get_current(void)
          {
              struct task_struct *cur;
              asm volatile("mrs %0, sp_el0" : "=r"(cur));
              return cur;
          }
          
          #define current get_current()
          
          #endif /* __ASM_CURRENT_H__ */
          HEADER_EOF
            echo "Created asm/current.h"
          fi

      - name: Download kptools
        run: |
          # Get latest release
          LATEST_URL=$(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest | grep browser_download_url | grep 'kptools-linux' | cut -d '"' -f4 | head -n1)
          if [ -z "$LATEST_URL" ]; then
            echo "No se pudo encontrar kptools, usando método alternativo"
            # Fallback: solo compilamos el .o
          else
            curl -sL "$LATEST_URL" -o kptools
            chmod +x kptools
            ./kptools --help || true
          fi

      - name: Compile KPM object
        run: |
          KP_INC=$(dirname "$(find kpatch-next -iname 'kpmodule.h' | head -n1)")
          echo "Usando includes de: $KP_INC"
          
          aarch64-none-linux-gnu-gcc \
            -c selinux_execmem_hide.c -o selinux_execmem_hide.o \
            -I"$KP_INC" \
            -I"$KP_INC/.." \
            -D__KERNEL__ \
            -fno-stack-protector \
            -fno-pic \
            -Wall \
            -Wno-declaration-after-statement \
            -O2 \
            -static

      - name: Package as .kpm
        run: |
          if [ -f kptools ]; then
            # Intentar con kptools
            ./kptools pack -o selinux_execmem_hide.kpm selinux_execmem_hide.o || \
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
          else
            # Fallback: solo renombrar
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
          fi
          
          echo "Archivos generados:"
          ls -la selinux_execmem_hide.*

      - name: Upload KPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: selinux_execmem_hide.kpm
