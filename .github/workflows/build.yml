name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu flex bison bc

      - name: Get kernel headers (5.10.198 - Android GKI)
        run: |
          git clone --depth 1 -b android12-5.10-2023-09 \
            https://android.googlesource.com/kernel/common.git kernel-headers
          cd kernel-headers
          # Usar configuración GKI para Android
          ARCH=arm64 scripts/kconfig/merge_config.sh arch/arm64/configs/gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- olddefconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build module
        run: |
          cat > Makefile <<'EOF'
          # Asegurar que se exportan los símbolos necesarios
          export KCFLAGS := -D__KERNEL__ -DMODULE -DEXPORT_SYMTAB
          
          ifneq ($(KERNELRELEASE),)
          obj-m := selinux_execmem_hide.o
          
          # Dependencias para hooks
          selinux_execmem_hide-y := selinux_execmem_hide.o
          
          else
          KDIR := $(CURDIR)/kernel-headers
          PWD := $(CURDIR)
          
          all:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(PWD) modules
          
          clean:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(PWD) clean
          endif
          EOF
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide.ko
          path: selinux_execmem_hide.ko
