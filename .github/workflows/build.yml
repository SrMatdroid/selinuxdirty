name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu flex bison bc

      - name: Get kernel headers (5.10 - Android GKI)
        run: |
          # Usar el tag específico de Android 12/13 para kernel 5.10
          git clone --depth 1 --branch android12-5.10-2022-12 \
            https://android.googlesource.com/kernel/common.git kernel-headers
          cd kernel-headers
          # Configurar para GKI
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- gki_defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build module
        run: |
          cat > Makefile <<'EOF'
          ifneq ($(KERNELRELEASE),)
          obj-m := selinux_execmem_hide.o
          ccflags-y := -D__KERNEL__ -DMODULE
          else
          KDIR := $(CURDIR)/kernel-headers
          PWD := $(CURDIR)
          
          all:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(PWD) modules
          
          clean:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(PWD) clean
          endif
          EOF
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide.ko
          path: selinux_execmem_hide.ko
