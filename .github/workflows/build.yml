name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # 1. Instalar el compilador oficial de ARM64 desde repositorios estables de Ubuntu
      - name: Install Native ARM64 Cross-Compiler
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu make git python3

      # 2. Clonación limpia del SDK oficial de KPatch-Next
      - name: Clone KernelPatch SDK
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next kpatch

      # 3. Compilación y enlazado nativo ELF de selinux-context-hide
      - name: Build selinux-context-hide
        run: |
          mkdir -p out
          # Generar archivo objeto con las cabeceras comunes
          aarch64-linux-gnu-gcc \
            -Isrc -I. -Ikpatch/kernel/include -Ikpatch/kernel/common/include -Ikpatch/kernel/patch/include -Ikpatch/kernel/linux/include -Ikpatch/kernel/linux/arch/arm64/include \
            -O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user= \
            -c -o selinux_context_hide.o src/selinux_context_hide.c
          
          # Enlazar usando formato reubicable puro compatible con KPatch-Next-Module
          aarch64-linux-gnu-gcc -r -o out/selinux_context_hide.kpm selinux_context_hide.o
          rm selinux_context_hide.o

      # 4. Compilación y enlazado nativo ELF de selinux-execmem-hide
      - name: Build selinux-execmem-hide
        run: |
          mkdir -p out
          # Generar archivo objeto con las cabeceras comunes
          aarch64-linux-gnu-gcc \
            -Isrc -I. -Ikpatch/kernel/include -Ikpatch/kernel/common/include -Ikpatch/kernel/patch/include -Ikpatch/kernel/linux/include -Ikpatch/kernel/linux/arch/arm64/include \
            -O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user= \
            -c -o selinux_execmem_hide.o src/selinux_execmem_hide.c
          
          # Enlazar usando formato reubicable puro compatible con KPatch-Next-Module
          aarch64-linux-gnu-gcc -r -o out/selinux_execmem_hide.kpm selinux_execmem_hide.o
          rm selinux_execmem_hide.o

      # 5. Subida de los módulos .kpm listos para flashear
      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
