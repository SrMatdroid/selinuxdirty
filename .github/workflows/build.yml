name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "TOOLCHAIN_PATH=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_ENV
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_PATH

      - name: Clone KernelPatch SDK
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next kpatch

      - name: Build selinux-context-hide
        run: |
          export PATH="$PWD/toolchain/bin:$PATH"
          mkdir -p out
          aarch64-none-elf-gcc \
            -I kpatch/kernel/patch/include \
            -nostdlib \
            -fno-builtin \
            -ffreestanding \
            -fno-stack-protector \
            -fpic \
            -Wall \
            -Wno-implicit-function-declaration \
            -o out/selinux_context_hide.kpm \
            src/selinux_context_hide.c

      - name: Build selinux-execmem-hide
        run: |
          export PATH="$PWD/toolchain/bin:$PATH"
          mkdir -p out
          aarch64-none-elf-gcc \
            -I kpatch/kernel/patch/include \
            -nostdlib \
            -fno-builtin \
            -ffreestanding \
            -fno-stack-protector \
            -fpic \
            -Wall \
            -Wno-implicit-function-declaration \
            -o out/selinux_execmem_hide.kpm \
            src/selinux_execmem_hide.c

      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
