name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone KPatch-Next headers
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          KPM_INC=$(dirname "$(find kpatch-next -name 'kpmodule.h' -type f | head -n1)")
          echo "KPM_INC=$KPM_INC" >> $GITHUB_ENV
          
          # Crear header complementario con definiciones faltantes
          cat > "$KPM_INC/kpm_compat.h" << 'EOF'
          #ifndef __KPM_COMPAT_H__
          #define __KPM_COMPAT_H__
          
          // Definiciones necesarias para compilación
          #ifdef __KERNEL__
          #define __user
          #else
          #define __user
          #endif
          
          // Funciones del kernel
          #define pr_info(fmt, ...)  printk(KERN_INFO fmt, ##__VA_ARGS__)
          #define pr_err(fmt, ...)   printk(KERN_ERR fmt, ##__VA_ARGS__)
          
          #define KERN_INFO ""
          #define KERN_ERR ""
          
          // kallsyms
          extern unsigned long kallsyms_lookup_name(const char *name);
          
          // current_uid
          extern unsigned int current_uid(void);
          
          // printk
          extern int printk(const char *fmt, ...);
          
          #endif /* __KPM_COMPAT_H__ */
          EOF

      - name: Build KPM module
        run: |
          echo "=== Compilando módulo KPM ==="
          
          aarch64-linux-gnu-gcc \
            -I"$KPM_INC" \
            -D__KERNEL__ \
            -DMODULE \
            -fno-pic \
            -fno-stack-protector \
            -O2 \
            -Wall \
            -Wno-implicit-function-declaration \
            -c selinux_execmem_hide.c \
            -o selinux_execmem_hide.o
          
          echo "=== Resultado ==="
          if [ -f selinux_execmem_hide.o ]; then
            echo "✓ Compilación exitosa"
            ls -la selinux_execmem_hide.o
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
            echo "✓ KPM creado"
          else
            echo "✗ Error"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: |
            selinux_execmem_hide.kpm
            selinux_execmem_hide.o
