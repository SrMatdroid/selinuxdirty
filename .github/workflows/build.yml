name: Build KPMs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make git curl tar

      - name: Download ARM GNU Toolchain 12.2.Rel1
        run: |
          mkdir -p toolchain
          curl -L "https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-elf.tar.xz" \
            -o toolchain.tar.xz
          tar -xf toolchain.tar.xz -C toolchain --strip-components=1

      - name: Clone KernelPatch
        run: |
          git clone --depth=1 https://github.com/bmax121/KernelPatch.git kpatch

      - name: Find KPM headers
        run: |
          echo "=== Buscando hook.h ==="
          find kpatch -name "hook.h" 2>/dev/null
          echo "=== Buscando kpmodule.h ==="
          find kpatch -name "kpmodule.h" 2>/dev/null
          HOOK=$(find kpatch -name "hook.h" | head -1)
          if [ -z "$HOOK" ]; then
            echo "ERROR: hook.h no encontrado"
            exit 1
          fi
          INCLUDE_DIR=$(dirname "$HOOK")
          echo "Include dir: $INCLUDE_DIR"
          echo "KPM_INCLUDE=$INCLUDE_DIR" >> $GITHUB_ENV

      - name: Build selinux-context-hide
        run: |
          export PATH="$PWD/toolchain/bin:$PATH"
          mkdir -p out
          aarch64-none-elf-gcc \
            -I "$KPM_INCLUDE" \
            -nostdlib \
            -fno-builtin \
            -ffreestanding \
            -fno-stack-protector \
            -fpic \
            -Wall \
            -Wno-implicit-function-declaration \
            -o out/selinux_context_hide.kpm \
            src/selinux_context_hide.c

      - name: Build selinux-execmem-hide
        run: |
          export PATH="$PWD/toolchain/bin:$PATH"
          mkdir -p out
          aarch64-none-elf-gcc \
            -I "$KPM_INCLUDE" \
            -nostdlib \
            -fno-builtin \
            -ffreestanding \
            -fno-stack-protector \
            -fpic \
            -Wall \
            -Wno-implicit-function-declaration \
            -o out/selinux_execmem_hide.kpm \
            src/selinux_execmem_hide.c

      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
