name: Build KPMs

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y make git curl tar python3

      - name: Download ARM GNU Toolchain 12.2.Rel1
        run: |
          mkdir -p toolchain
          curl -L "https://arm.com" \
            -o toolchain.tar.xz
          tar -xf toolchain.tar.xz -C toolchain --strip-components=1

      - name: Clone KernelPatch
        run: |
          git clone --depth=1 https://github.com kpatch

      - name: Build KPMs using Native KernelPatch Tool
        run: |
          export PATH="$PWD/toolchain/bin:$PATH"
          mkdir -p out
          
          # Compilación usando el script de empaquetado nativo de KernelPatch
          # Esto inyecta los símbolos de kpm, kpver y los offsets requeridos por el cargador
          
          # 1. Compilar selinux-context-hide
          aarch64-none-elf-gcc -c -O2 -fpic -ffreestanding -fno-builtin -fno-stack-protector \
            -I src -I kpatch/kernel/include -I kpatch/kernel/patch/include \
            -D__user= -Wall src/selinux_context_hide.c -o out/selinux_context_hide.o
          
          python3 kpatch/tools/kpm-pack.py out/selinux_context_hide.o out/selinux_context_hide.kpm

          # 2. Compilar selinux-execmem-hide
          aarch64-none-elf-gcc -c -O2 -fpic -ffreestanding -fno-builtin -fno-stack-protector \
            -I src -I kpatch/kernel/include -I kpatch/kernel/patch/include \
            -D__user= -Wall src/selinux_execmem_hide.c -o out/selinux_execmem_hide.o
          
          python3 kpatch/tools/kpm-pack.py out/selinux_execmem_hide.o out/selinux_execmem_hide.kpm

      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
