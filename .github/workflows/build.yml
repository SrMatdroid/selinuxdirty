name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk-r27c-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Clone KPatch template
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPTemplate.git template
          # Usar el Makefile del template que ya está configurado para KPatch
          cp template/Makefile .
          cp template/kpmodule.h template/hook.h template/kputils.h . 2>/dev/null || true
          # Si no tiene los headers, clonar KPatch
          if [ ! -f kpmodule.h ]; then
            git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch
            cp kpatch/kernel/include/*.h .
          fi

      - name: Build KPM
        run: |
          # Usar el compilador del NDK
          export PATH="$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin:$PATH"
          
          # Compilar con aarch64
          aarch64-linux-android33-clang \
            -I. \
            -D__KERNEL__ \
            -DMODULE \
            -fno-stack-protector \
            -fno-pic \
            -O2 \
            -c selinux_execmem_hide.c \
            -o selinux_execmem_hide.o
          
          # El .kpm es el .o renombrado
          cp selinux_execmem_hide.o selinux_execmem_hide.kpm
          
          ls -la *.kpm *.o

      - name: Upload KPM
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide.kpm
          path: selinux_execmem_hide.kpm
