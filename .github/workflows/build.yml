name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Native ARM64 Cross-Compiler
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gcc-aarch64-linux-gnu make git python3

      - name: Clone KernelPatch SDK
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next kpatch

      - name: Build selinux-execmem-hide
        run: |
          mkdir -p out
          aarch64-linux-gnu-gcc \
            -I. -Ikpatch/kernel/include -Ikpatch/kernel/common/include -Ikpatch/kernel/patch/include -Ikpatch/kernel/linux/include -Ikpatch/kernel/linux/arch/arm64/include \
            -O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user= \
            -c -o selinux_execmem_hide.o selinux_execmem_hide.c
          aarch64-linux-gnu-gcc -r -o out/selinux_execmem_hide.kpm selinux_execmem_hide.o
          rm selinux_execmem_hide.o

      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
