name: Build KPM
on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2.Rel1
        run: |
          wget -q https://developer.arm.com/-/media/Files/downloads/gnu/12.2.rel1/binrel/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> "$GITHUB_PATH"

      - name: Clone KPatch-Next (solo headers, no kernel source)
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          find kpatch-next -iname "kpmodule.h"   # verifica dónde cayó, ajusta KP_INC abajo

      - name: Download kptools
        run: |
          # Ajusta el patrón de asset al nombre real del release actual
          curl -sL $(curl -s https://api.github.com/repos/KernelSU-Next/KPatch-Next/releases/latest \
            | grep browser_download_url | grep 'kptools-linux' | cut -d '"' -f4) -o kptools
          chmod +x kptools
          ./kptools --help    # confirma la sintaxis real antes de usarla en el paso siguiente

      - name: Compile KPM object
        run: |
          KP_INC=$(dirname "$(find kpatch-next -iname 'kpmodule.h' | head -n1)")
          aarch64-none-linux-gnu-gcc \
            -c selinux_execmem_hide.c -o selinux_execmem_hide.o \
            -I"$KP_INC" \
            -fno-stack-protector -fno-pic -Wall -O2 \
            -static

      - name: Package as .kpm
        run: |
          # Sustituye por la subcomando real que reporte `./kptools --help`
          ./kptools <subcomando-real> -o selinux_execmem_hide.kpm selinux_execmem_hide.o

      - name: Upload KPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: selinux_execmem_hide.kpm
