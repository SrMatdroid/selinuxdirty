name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone KPatch-Next headers
        run: |
          git clone --depth 1 https://github.com/KernelSU-Next/KPatch-Next.git kpatch-next
          echo "=== Buscando headers de KPM ==="
          find kpatch-next -name "*.h" -type f | head -20
          
          # Encontrar directorio de includes
          KPM_INC=$(dirname "$(find kpatch-next -name 'kpmodule.h' -type f | head -n1)")
          echo "KPM_INC=$KPM_INC"
          echo "KPM_INC=$KPM_INC" >> $GITHUB_ENV
          
          echo "=== Headers encontrados ==="
          ls -la "$KPM_INC/"

      - name: Build KPM module
        run: |
          echo "=== Compilando módulo KPM ==="
          
          # Compilar directamente con aarch64 gcc
          aarch64-linux-gnu-gcc \
            -I"$KPM_INC" \
            -D__KERNEL__ \
            -DMODULE \
            -fno-pic \
            -fno-stack-protector \
            -O2 \
            -Wall \
            -c selinux_execmem_hide.c \
            -o selinux_execmem_hide.o 2>&1 | tee build.log
          
          echo "=== Resultado de compilación ==="
          if [ -f selinux_execmem_hide.o ]; then
            echo "✓ Compilación exitosa"
            ls -la selinux_execmem_hide.o
            file selinux_execmem_hide.o
            
            # Crear .kpm (renombrar .o)
            cp selinux_execmem_hide.o selinux_execmem_hide.kpm
            echo "✓ KPM creado: selinux_execmem_hide.kpm"
            ls -la selinux_execmem_hide.kpm
          else
            echo "✗ Error de compilación:"
            cat build.log
            exit 1
          fi

      - name: Upload KPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: |
            selinux_execmem_hide.kpm
            selinux_execmem_hide.o
          if-no-files-found: error
