name: Build KPM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GNU Toolchain 12.2
        run: |
          wget -q https://arm.com
          tar xf arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu.tar.xz
          echo "TOOLCHAIN_PATH=$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_ENV
          echo "$PWD/arm-gnu-toolchain-12.2.rel1-x86_64-aarch64-none-linux-gnu/bin" >> $GITHUB_PATH

      - name: Clone KernelPatch SDK
        run: |
          git clone --depth 1 https://github.com kpatch

      - name: Build selinux-context-hide
        run: |
          mkdir -p out
          # 1. Compilar el archivo objeto intermedio .o sin enlazar
          aarch64-none-linux-gnu-gcc \
            -Isrc -I. -Ikpatch/kernel/include -Ikpatch/kernel/patch/include -Ikpatch/kernel/linux/include -Ikpatch/kernel/linux/arch/arm64/include \
            -O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user= \
            -c -o selinux_context_hide.o src/selinux_context_hide.c
          
          # 2. Empaquetar usando el script oficial de KPatch-Next para inyectar los metadatos (.kpm.meta)
          python3 kpatch/tools/kpm-pack.py selinux_context_hide.o out/selinux_context_hide.kpm
          rm selinux_context_hide.o

      - name: Build selinux-execmem-hide
        run: |
          mkdir -p out
          # 1. Compilar el archivo objeto intermedio .o sin enlazar
          aarch64-none-linux-gnu-gcc \
            -Isrc -I. -Ikpatch/kernel/include -Ikpatch/kernel/patch/include -Ikpatch/kernel/linux/include -Ikpatch/kernel/linux/arch/arm64/include \
            -O2 -fno-stack-protector -ffreestanding -fno-asynchronous-unwind-tables -fno-unwind-tables -D__user= \
            -c -o selinux_execmem_hide.o src/selinux_execmem_hide.c
          
          # 2. Empaquetar usando el script oficial de KPatch-Next para inyectar los metadatos (.kpm.meta)
          python3 kpatch/tools/kpm-pack.py selinux_execmem_hide.o out/selinux_execmem_hide.kpm
          rm selinux_execmem_hide.o

      - name: Upload KPMs
        uses: actions/upload-artifact@v4
        with:
          name: kpms
          path: out/*.kpm
          if-no-files-found: error
