name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            flex bison bc libssl-dev

      - name: Get Android Common Kernel source (5.10)
        run: |
          # Clonar el kernel completo, no solo headers
          git clone --depth 1 --branch android12-5.10 \
            https://android.googlesource.com/kernel/common.git kernel-source
          
      - name: Prepare kernel for module compilation
        run: |
          cd kernel-source
          # Configuración básica para ARM64
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          # Preparar para compilar módulos
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build KPM module
        run: |
          cat > Makefile <<'EOF'
          # Makefile para KPM
          ifneq ($(KERNELRELEASE),)
          # Aquí es cuando se compila dentro del kernel
          obj-m := selinux_execmem_hide.o
          ccflags-y := -D__KERNEL__ -DMODULE -DKPM_MODULE
          else
          # Compilación externa
          KDIR := $(CURDIR)/kernel-source
          
          all:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(CURDIR) modules
          
          clean:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(CURDIR) clean
          endif
          EOF
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Rename to .kpm
        run: |
          if [ -f selinux_execmem_hide.ko ]; then
            # KPM es básicamente un .ko renombrado
            cp selinux_execmem_hide.ko selinux_execmem_hide.kpm
            echo "KPM module built successfully"
            ls -la selinux_execmem_hide.*
          else
            echo "ERROR: Module not built"
            exit 1
          fi

      - name: Upload KPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide
          path: |
            selinux_execmem_hide.kpm
            selinux_execmem_hide.ko
