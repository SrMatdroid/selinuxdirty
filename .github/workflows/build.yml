name: Build KPM

on:
  push:
    paths:
      - 'selinux_execmem_hide.c'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu flex bison bc

      - name: Get kernel headers (Android 5.10)
        run: |
          # Primero, veamos qué ramas existen
          git ls-remote --heads https://android.googlesource.com/kernel/common.git | grep android12-5.10 || true
          # Usamos la rama principal android12-5.10 que siempre existe
          git clone --depth 1 --branch android12-5.10 \
            https://android.googlesource.com/kernel/common.git kernel-headers
          
      - name: Prepare kernel headers
        run: |
          cd kernel-headers
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- modules_prepare

      - name: Build KPM module
        run: |
          # Crear Makefile simple
          cat > Makefile <<'EOF'
          ifneq ($(KERNELRELEASE),)
          obj-m := selinux_execmem_hide.o
          ccflags-y := -I$(src)
          else
          KDIR := $(CURDIR)/kernel-headers
          
          default:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(CURDIR) modules
          
          clean:
          	$(MAKE) ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- -C $(KDIR) M=$(CURDIR) clean
          endif
          EOF
          
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu-

      - name: Check built module
        run: |
          file selinux_execmem_hide.ko
          ls -la selinux_execmem_hide.ko

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: selinux_execmem_hide.ko
          path: selinux_execmem_hide.ko
